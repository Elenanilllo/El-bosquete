<style>
/****** INcrustado hoja de estilos *******/

body {
  overflow: hidden;
  background-size: cover;
  position: fixed;
  padding: 0px;
  margin: 0px;
  width: 100%;
  height: 100%;
  color: #333;
  font: normal 14px/1.618em "Roboto", sans-serif;
  -webkit-font-smoothing: antialiased; 
}

body:before {
  content: "";
  height: 0px;
  padding: 0px;
 /* border: 0em solid #bcdee7; */
  position: absolute;
  left: 50%;
  top: 100%;
  z-index: 2;
  display: block;
  transform: translate(-50%, -50%);
  animation: puff 1s 1.8s cubic-bezier(0.55, 0.055, 0.675, 0.19) forwards, borderRadius 0.2s 2.3s linear forwards;
/*  background: #bcdee7; */
 
 

  background-size: cover;
/*  background-color: #bcdee7;  */
  background-blend-mode: soft-light;
  background-image: url('./fondo.jpg');
}

h1,
h2 {
  
  font-weight: 50px;
  margin: 0px 0px 5px 0px;
}

h1 {
  font-size: 24px;
}

h2 {
  font-size: 16px;
}

p {
  margin: 0px;
}

.profile-card {
  /* background: #f5f3f3; */
  width: 450px;
  height: 156px;
  position: absolute;
  left: 50%;
  top: 50%;
  z-index: 2;
  overflow: hidden;
  opacity: 1;
  margin-top: 70px;
  transform: translate(-50%, -50%);
  border-radius: 50%;
  box-shadow: 0px 3px 6px rgba(0, 0, 0, 0.16), 0px 3px 6px rgba(0, 0, 0, 0.23);
  animation: init 1.5s 0.2s cubic-bezier(0.55, 0.055, 0.275, 0.19) forwards, materia 0.5s .9s cubic-bezier(0.86, 0, 0.07, 1) forwards; 
}
.profile-card header {
  width:  270px; 
  height: 280px;
  
  padding: 50px 0px 10px 0px;
  display: inline-block;
  float: none;
  border-right: 2px dashed #EEEEEE;
  background: #ffffff; 
  margin-top: 50px;
  opacity: 0;
  text-align: center;
  animation: moveIn 1s 1.5s ease forwards;
}

.profile-card header h1 {
  /*** color nombre y logotipos ***/
  color: #1c1c8F;  
}

.profile-card header a {
  display: inline-block;
  text-align: center;
  position: relative;
  margin: -15px 20px;
}

.profile-card header a > img {
  max-width: 100%;
}

.profile-card header a:after {
  position: absolute;
  content: "$500";
  bottom: 3px;
  right: 3px;
  padding: 10px 5px;
  border: 4px solid #FFFFFF;
  transform: scale(0);
  background: linear-gradient(#FF5722 0%, #FF5722 50%, #FF5722 50%, #FF5722 100%);
  color: #fff;
  border-radius: 50%;
  box-shadow: 0px 1px 3px rgba(0, 0, 0, 0.1);
  animation: scaleIn 1.3s 1.5s ease forwards;
}

.profile-card .profile-bio {
  width: 45%;
  height: 45%;
  float: right;
  padding: 50px 20px 30px 20px;
  background: #FFFFFF;
  margin-top: 50px;
  text-align: center;
  opacity: 0;
  animation: moveIn 1s 1s ease forwards;
}

    

.list-unstyled {
  margin-top: 20px;
  padding-left: 0;
  list-style: none;
}
.list-inline li {
  display: inline-block;
  padding-right: 10px;
  padding-left: 10px;
}
.social-icons .fa {
  font-size: 1.5em;
  line-height: 0px;
  text-align: center;
  color: #3c3c3c;
  -webkit-transition: all 0.3s ease-in-out;
  -moz-transition: all 0.3s ease-in-out;
  -ms-transition: all 0.3s ease-in-out;
  -o-transition: all 0.3s ease-in-out;
  transition: all 0.3s ease-in-out;
}
.social-icons .fa:hover,
.social-icons .fa:active {
  font-size: 3em;
  -webkit-box-shadow: 1px 1px 3px #333;
  -moz-box-shadow: 1px 1px 3px #333;
  box-shadow: 1px 1px 3px #333;
}


    
@keyframes init {
  0% {
    width: 0px;
    height: 0px;
  }
  100% {
    width: 36px;
    height: 36px;
    margin-top: 0px;
    opacity: 1;
  }
}

@keyframes materia {
  0% {
    background: #E0E0E0;
  }
  50% {
    border-radius: 4px;
    width: 500px;    /* new */
    height: 300px;   /* new */
  }
  100% {
    width: 600px;    /* original was 500 */
    height: 400px;   /* original was 300 */
    background: #FFFFFF;
    opacity: 0.9;
   
    border-radius: 4px;
  }
}

@keyframes moveIn {
  0% {
    margin-top: 50px;
    opacity: 0;
  }
  100% {
    opacity: 1;
    margin-top: -20px;
  }
}


/*******   mediaQuery ****************/

@media screen and (max-width: 550px) {
  .profile-card header {
    width: auto;
    height: auto;
    padding: 45px 0 30px 0;
    display: block;
    float: none;
    border-right: none;
  }

  .profile-card header a > img {
    width: 250px;
  }
  
  .profile-card .profile-bio {
    width: auto;
    height: auto;
    padding: 0px 20px 10px 20px;
    display: block;
    float: none;
  }

  @keyframes materia {
    0% {
      background: #E0E0FF;
    }
    50% {
      border-radius: 4px;
    }
    100% {
      width: 90%;
      height: 90%;
      background: #FFFFFF;
      border-radius: 4px;
    }
  }
}

/******* MOVIL  mediaQuery ****************/

@media only screen and (min-device-width : 320px) and (max-device-width : 480px) {
  
  
  .profile-card header {
    width: auto;
    height: auto;
    padding: 15px 0 30px 0;
    display: block;
    
    line-height: 1.4em;
    font-size: 30px; 
    border-right: none;
  }

  .profile-card header a > img {
    width: 75%;
  
  }
  
  
  .profile-bio  {
  padding-top:30px;
  line-height: 1.5em;
  }
  
  h1 {
  font-size: 48px;
}

    h2 {
  font-size: 36px;
}

  .footer {
    line-height: 1.2em;
    
    }

  

  .profile-card .profile-bio {
    width: 80%;
    height: auto;
    font-size: 35px;
    padding: 0px 20px 10px 20px;
    display: block;
    float: none;
  }
  



  @keyframes materia {
    0% {
      background: #E0E0FF;
    }
    50% {
      border-radius: 4px;
    }
    100% {
      width: 90%;
      height: 90%;
      background: #FFFFFF;
      border-radius: 4px;
    }
  }
}

.button-pulse {
 
  color: blue;
  display: relative; 
 
  margin-top: 50px;
  text-decoration: none;
  letter-spacing: 3px;
  border: 2px solid #fdbbaf;
  border-radius: 100px;
  padding: 10px 10px;
  
   animation: pulse 2s infinite 3s cubic-bezier(0.25, 0, 0, 1);
  box-shadow: 0 0 0 0  #fdbbaf; /* #1F4141; */
}
    
@keyframes pulse {
  to {
    box-shadow: 0 0 0 8px rgba(250, 250, 250, 0); 
  }
}


.footer {
    display: block;

    border-top:20px;
    padding: 25px 25px 500px 0px;
    
    }

}

   @import url("https://fonts.googleapis.com/css2?family=Poppins&display=swap");

///// _mixins.scss

@mixin display-flex {
  display: flex;
  align-items: center;
  justify-content: center;
}

///// _mixins.scss

* {
  margin: 0;
  padding: 0;

  box-sizing: border-box;
}

body {
  @include display-flex;

  background-color: white;
  font-family: "Poppins", sans-serif;
}

.profile-cards {
  @include display-flex;
  flex-wrap: wrap;
  gap: 50px;

  margin: 30px;

  .card {
    display: flex;
    align-items: center;
    justify-content: space-between;

    width: 700px;
    height: 350px;

    position: relative;

    color: #2d2d2d;
    background-color: #b2e5e6;
    letter-spacing: 1px;

    border: 25px solid #a0cdcf;
    border-radius: 25px;

    overflow: hidden;

    box-shadow: 0 0 10px rgba(0, 0, 0, 0.3);

    .card-description {
      display: flex;
      flex-direction: column;
      gap: 20px;

      padding: 40px;

      width: auto;
      height: 100%;

      .card-description-title {
        color: black;

        font-size: 18px;
      }

      .card-description-profession {
        display: block;

        font-size: 16px;
      }

      .card-description-company {
        display: block;

        font-size: 14px;

        cursor: pointer;

        &:hover {
          text-decoration: underline;
        }
      }

      .card-description-social {
        position: absolute;
        bottom: 40px;

        .card-description-social-follow {
          display: block;

          margin-bottom: 8px;

          color: #555572;
          font-size: 14px;
        }

        ul {
          @include display-flex;
          gap: 10px;

          li {
            list-style-type: none;

            a {
              @include display-flex;

              width: 40px;
              height: 40px;

              color: #121212;

              border-radius: 50%;

              box-shadow: 6px 6px 12px #97c3c4, -6px -6px 12px #cdffff;

              transition: all 0.4s;

              &:hover {
                color: white;

                transform: translate(0, -7px);
              }

              svg {
                width: calc(100% - 15px);
                height: calc(100% - 15px);
              }
            }
          }

          li:nth-child(1) {
            a {
              &:hover {
                background-color: #1da1f2;
              }
            }
          }

          li:nth-child(2) {
            a {
              &:hover {
                background-color: #3f729b;
              }
            }
          }

          li:nth-child(3) {
            a {
              &:hover {
                background-color: #00405d;
              }
            }
          }

          li:nth-child(4) {
            a {
              &:hover {
                background-color: #0a66c2;
              }
            }
          }
        }
      }
    }

    .card-image {
      width: 250px;
      height: 100%;

      object-fit: cover;
    }
  }
}


</style>
